name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "lambdas/**"
      - "services/**"
      - "frontend/**"
      - ".github/workflows/**"

permissions:
  id-token: write      # OIDC token exchange
  contents: read
  pull-requests: write # post plan comment

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform -chdir=infra/envs/us-east-1 init

      - name: Format Check
        run: terraform fmt -check -recursive infra/

      - name: Validate
        run: terraform -chdir=infra/envs/us-east-1 validate

      - name: Plan
        id: plan
        run: |
          set -o pipefail
          terraform -chdir=infra/envs/us-east-1 plan -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw  = fs.readFileSync('plan.txt', 'utf8');
            const body = raw.length > 60000 ? raw.slice(0, 60000) + '\n\n_(truncated)_' : raw;
            const icon = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan ${icon}\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
